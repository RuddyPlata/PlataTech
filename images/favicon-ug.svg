<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="phone-grad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0"   stop-color="#0066ff"/>
      <stop offset="1"   stop-color="#0044cc"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0.25"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Outer white/black border (like in the logo) -->
  <rect width="32" height="32" rx="8" fill="#111111"/>

  <!-- Blue phone/tablet shape — the key brand element -->
  <rect x="3" y="3" width="26" height="26" rx="7" fill="url(#phone-grad)"/>

  <!-- Camera notch pill at top (dark, like in the logo) -->
  <rect x="10" y="6.5" width="12" height="3.5" rx="1.75" fill="#001a66"/>

  <!-- Screen body -->
  <rect x="5" y="12" width="22" height="14" rx="2" fill="#003acc" opacity="0.5"/>

  <!-- Shine reflection -->
  <path d="M4 4 Q4 3 5 3 L17 3 Q5 8 4 20 Z" fill="url(#shine)" rx="7"/>
</svg>
