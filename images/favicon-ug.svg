<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0055ff"/>
  <!-- Smartphone outline -->
  <rect x="10" y="5" width="12" height="22" rx="2.5" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Screen area -->
  <rect x="12" y="8.5" width="8" height="13" rx="1" fill="white" opacity=".15"/>
  <!-- Home button -->
  <circle cx="16" cy="24" r="1.2" fill="white" opacity=".8"/>
  <!-- Signal lines on screen (gadget display) -->
  <line x1="13.5" y1="11.5" x2="18.5" y2="11.5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".9"/>
  <line x1="13.5" y1="14" x2="18.5" y2="14" stroke="white" stroke-width="1" stroke-linecap="round" opacity=".6"/>
  <line x1="13.5" y1="16.5" x2="16.5" y2="16.5" stroke="white" stroke-width="1" stroke-linecap="round" opacity=".4"/>
</svg>
