<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a3a7a"/>
      <stop offset="1" stop-color="#0b1d3e"/>
    </linearGradient>
    <linearGradient id="chrome-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#7a8eae"/>
      <stop offset="0.4" stop-color="#cdd6e8"/>
      <stop offset="1"   stop-color="#7a8eae"/>
    </linearGradient>
    <linearGradient id="helmet-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#d8dfe8"/>
      <stop offset="0.5" stop-color="#b0bac8"/>
      <stop offset="1"   stop-color="#8090a8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield background -->
  <path d="M16 1.5 L29 6 L29 17.5 C29 24 23.5 29.5 16 31.5 C8.5 29.5 3 24 3 17.5 L3 6 Z"
        fill="url(#shield-grad)"/>

  <!-- Shield chrome border -->
  <path d="M16 1.5 L29 6 L29 17.5 C29 24 23.5 29.5 16 31.5 C8.5 29.5 3 24 3 17.5 L3 6 Z"
        fill="none" stroke="url(#chrome-grad)" stroke-width="1.5"/>

  <!-- Inner shield blue accent -->
  <path d="M16 4 L26.5 7.8 L26.5 17.5 C26.5 23 22 27.5 16 29.5 C10 27.5 5.5 23 5.5 17.5 L5.5 7.8 Z"
        fill="none" stroke="#1e50d4" stroke-width="0.8" opacity="0.7"/>

  <!-- Blue V at bottom of shield -->
  <path d="M10 20 L16 26 L22 20" fill="none" stroke="#2060e0" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Robot helmet (simplified) -->
  <!-- Helmet top/dome -->
  <path d="M11.5 13 Q11.5 8 16 8 Q20.5 8 20.5 13 L20.5 15.5 L11.5 15.5 Z"
        fill="url(#helmet-grad)"/>
  <!-- Helmet chin -->
  <rect x="12" y="15.5" width="8" height="3" rx="0.5" fill="#a0aab8"/>

  <!-- Dark visor band -->
  <rect x="11.5" y="12.5" width="9" height="3" rx="1" fill="#0a1628"/>

  <!-- Glowing blue eyes -->
  <circle cx="14" cy="14" r="1.1" fill="#0055ff" filter="url(#glow)"/>
  <circle cx="18" cy="14" r="1.1" fill="#0055ff" filter="url(#glow)"/>
  <circle cx="14" cy="14" r="0.55" fill="#88bbff"/>
  <circle cx="18" cy="14" r="0.55" fill="#88bbff"/>

  <!-- Shoulder/armor hints -->
  <path d="M9 16.5 Q9 15 11.5 15 L11.5 18.5 Q9 18.5 9 17 Z" fill="#9090a8"/>
  <path d="M23 16.5 Q23 15 20.5 15 L20.5 18.5 Q23 18.5 23 17 Z" fill="#9090a8"/>
</svg>
