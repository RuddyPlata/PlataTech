<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Nueva contraseña - Plata Tech Store</title>
<link rel="icon" type="image/x-icon" href="../images/favicon-pt.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/shop.css"/>
<style>
.rp-section {
  min-height: 80vh;
  display: flex; align-items: center; justify-content: center;
  padding: 3rem 1rem;
}
.rp-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem 2rem;
  width: 100%; max-width: 420px;
  box-shadow: 0 8px 40px rgba(0,0,0,.07);
}
.rp-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, #1447ff, #4f7cff);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.25rem;
  box-shadow: 0 8px 24px rgba(20,71,255,.3);
  animation: pop .5s cubic-bezier(.16,1,.3,1);
}
@keyframes pop { 0%{transform:scale(.4);opacity:0} 100%{transform:scale(1);opacity:1} }
.rp-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.75rem; font-weight: 800;
  letter-spacing: -0.03em; color: var(--ink);
  text-align: center; margin-bottom: .4rem;
}
.rp-sub {
  font-size: .9rem; color: var(--ink-2);
  text-align: center; margin-bottom: 1.75rem;
  line-height: 1.5;
}
.field { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
.field label { font-size: .72rem; font-weight: 700; color: var(--ink-2); text-transform: uppercase; letter-spacing: .05em; }
.field input {
  padding: .8rem 1rem;
  border: 1.5px solid var(--border); border-radius: 10px;
  font: inherit; font-size: .9rem; color: var(--ink);
  background: var(--white); outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(20,71,255,.1);
}
.field input.err { border-color: var(--red); }
.btn-block { width: 100%; margin-top: .5rem; }
.form-error {
  background: #fef2f2; border: 1px solid #fca5a5;
  color: #dc2626; padding: .7rem 1rem;
  border-radius: 10px; font-size: .82rem;
  margin-bottom: 1rem; display: none;
}
.form-error.visible { display: block; }
.form-success {
  background: #f0fdf4; border: 1px solid #86efac;
  color: #059669; padding: .7rem 1rem;
  border-radius: 10px; font-size: .82rem;
  margin-bottom: 1rem; display: none;
  line-height: 1.5;
}
.form-success.visible { display: block; }
.strength-bar {
  height: 4px; border-radius: 2px;
  background: var(--border); margin-top: .35rem; overflow: hidden;
}
.strength-fill {
  height: 100%; border-radius: 2px;
  transition: width .3s, background .3s;
  width: 0%;
}
.strength-label { font-size: .7rem; color: var(--ink-3); margin-top: .25rem; }
</style>
</head>
<body>

<nav class="shop-nav">
  <div class="container shop-nav-inner">
    <a href="index.html" class="shop-brand">
      <div class="shop-brand-mark"><img src="../images/logo-platatech.png" alt="Plata Tech"/></div>
      <div>
        <div class="shop-brand-name">Plata Tech</div>
        <div class="shop-brand-sub">Store</div>
      </div>
    </a>
  </div>
</nav>

<section class="rp-section">
  <div class="rp-card" id="rpRoot">
    <div class="rp-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 class="rp-title">Nueva contraseña</h1>
    <p class="rp-sub">Elige una contraseña segura para tu cuenta.</p>

    <div class="form-error" id="rpError"></div>
    <div class="form-success" id="rpSuccess"></div>

    <div id="rpForm">
      <div class="field">
        <label for="newPw">Nueva contraseña</label>
        <input type="password" id="newPw" placeholder="Mínimo 8 caracteres" autocomplete="new-password"/>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="field">
        <label for="confirmPw">Confirmar contraseña</label>
        <input type="password" id="confirmPw" placeholder="Repite tu contraseña" autocomplete="new-password"/>
      </div>
      <button class="btn btn-primary btn-lg btn-block" id="rpBtn">Guardar contraseña</button>
    </div>
  </div>
</section>

<footer class="shop-footer">
  <div class="container shop-footer-inner">
    <span>© 2025 Plata Tech Solutions</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/sb.js"></script>
<script>
const rpError   = document.getElementById('rpError');
const rpSuccess = document.getElementById('rpSuccess');
const rpBtn     = document.getElementById('rpBtn');
const newPw     = document.getElementById('newPw');
const confirmPw = document.getElementById('confirmPw');

// Password strength meter
newPw.addEventListener('input', () => {
  const v = newPw.value;
  const fill = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  let score = 0;
  if (v.length >= 8)  score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^a-zA-Z0-9]/.test(v)) score++;
  const levels = [
    { pct: '0%',   color: 'transparent', text: '' },
    { pct: '25%',  color: '#ef4444',     text: 'Muy débil' },
    { pct: '50%',  color: '#f97316',     text: 'Débil' },
    { pct: '75%',  color: '#eab308',     text: 'Buena' },
    { pct: '90%',  color: '#22c55e',     text: 'Fuerte' },
    { pct: '100%', color: '#059669',     text: 'Muy fuerte' },
  ];
  const lvl = levels[Math.min(score, 5)];
  fill.style.width = lvl.pct;
  fill.style.background = lvl.color;
  label.textContent = lvl.text;
  label.style.color = lvl.color;
});

// Wait for Supabase to establish session from URL token
window.SB.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Session is ready — user can now set new password
    rpBtn.addEventListener('click', doReset);
  }
});

// Fallback: also check existing session on load
(async () => {
  const { data: { session } } = await window.SB.auth.getSession();
  if (session) rpBtn.addEventListener('click', doReset);
})();

async function doReset() {
  const pw  = newPw.value;
  const pw2 = confirmPw.value;
  rpError.classList.remove('visible');
  rpSuccess.classList.remove('visible');

  if (pw.length < 8) {
    rpError.textContent = 'La contraseña debe tener al menos 8 caracteres.';
    rpError.classList.add('visible');
    return;
  }
  if (pw !== pw2) {
    rpError.textContent = 'Las contraseñas no coinciden.';
    rpError.classList.add('visible');
    return;
  }

  rpBtn.disabled = true;
  rpBtn.textContent = 'Guardando…';

  const { error } = await window.SB.auth.updateUser({ password: pw });

  rpBtn.disabled = false;
  rpBtn.textContent = 'Guardar contraseña';

  if (error) {
    rpError.textContent = 'No se pudo actualizar la contraseña. El enlace puede haber expirado.';
    rpError.classList.add('visible');
  } else {
    document.getElementById('rpForm').style.display = 'none';
    rpSuccess.textContent = '¡Contraseña actualizada! Redirigiendo a tu cuenta…';
    rpSuccess.classList.add('visible');
    setTimeout(() => { location.href = 'cuenta.html'; }, 2500);
  }
}
</script>
</body>
</html>
