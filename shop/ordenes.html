<link rel="stylesheet" href="assets/shop.css"/>
<style>
.ord-section { padding: 3rem 0 5rem; }

.lookup-box {
  max-width: 520px; margin: 0 auto;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 18px; padding: 2.5rem 2rem; text-align: center;
}
.lookup-box h2 { font-family:'Plus Jakarta Sans',sans-serif; font-size:1.35rem; font-weight:800; margin-bottom:.5rem; }
.lookup-box p { color:var(--ink-2); font-size:.9rem; margin-bottom:1.5rem; line-height:1.55; }
.lookup-form { display:flex; gap:.5rem; }
.lookup-form input {
  flex:1; padding:.8rem 1.1rem;
  border:1.5px solid var(--border); border-radius:12px;
  font:inherit; font-size:.95rem; color:var(--ink);
  background:var(--off-white); outline:none;
  transition:border-color .2s; text-transform:uppercase;
}
.lookup-form input::placeholder { text-transform:none; }
.lookup-form input:focus { border-color:var(--blue); background:var(--white); }
.lookup-form button {
  padding:.8rem 1.5rem; border-radius:12px;
  background:var(--ink); color:var(--white);
  font:inherit; font-size:.9rem; font-weight:700;
  cursor:pointer; border:0; transition:background .2s, transform .15s;
}
.lookup-form button:hover { background:var(--blue); transform:translateY(-1px); }
.lookup-error {
  margin-top:1rem; padding:.75rem 1rem; border-radius:10px;
  background:#fef2f2; color:#b91c1c; font-size:.85rem;
  border:1px solid #fecaca; display:none;
}
.lookup-error.show { display:block; }
.admin-link {
  margin-top:1.5rem; display:inline-block;
  font-size:.78rem; color:var(--ink-3);
  cursor:pointer; border:0; background:0;
  text-decoration:underline; transition:color .2s;
}
.admin-link:hover { color:var(--ink); }

/* ── Order result ──────────────────────────────────── */
.ord-result { max-width:640px; margin:0 auto; background:var(--white); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
.ord-result-head { padding:1.5rem 1.75rem; background:linear-gradient(135deg,var(--navy),var(--blue)); color:var(--white); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
.ord-result-id { font-family:'Space Grotesk',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:.04em; }
.ord-result-date { font-size:.82rem; opacity:.8; }
.ord-result-body { padding:1.5rem 1.75rem; }
.ord-status-pill {
  display:inline-flex; align-items:center; gap:.4rem;
  padding:.3rem .75rem; border-radius:100px;
  font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  margin-bottom:1rem;
}
.s-pendiente  { background:#fffbe6; color:#8a6d10; border:1px solid rgba(212,162,74,.3); }
.s-pagado     { background:#ecfdf5; color:#065f46; border:1px solid rgba(5,150,105,.2); }
.s-contactado { background:#e0f2fe; color:#0369a1; border:1px solid rgba(3,105,161,.2); }
.s-encamino   { background:#fef3c7; color:#92400e; border:1px solid rgba(217,119,6,.2); }
.s-entregado  { background:#ecfdf5; color:#065f46; border:1px solid rgba(5,150,105,.2); }
.s-cancelado  { background:#fef2f2; color:#991b1b; border:1px solid rgba(185,28,28,.2); }
.ord-item { display:flex; justify-content:space-between; align-items:baseline; padding:.5rem 0; border-bottom:1px solid var(--border); gap:.75rem; }
.ord-item:last-child { border-bottom:0; }
.ord-item-name { font-size:.9rem; font-weight:600; color:var(--ink); flex:1; }
.ord-item-meta { font-size:.78rem; color:var(--ink-3); }
.ord-item-price { font-size:.9rem; font-weight:700; color:var(--ink); white-space:nowrap; }
.ord-totals { padding-top:1rem; border-top:1px solid var(--border); }
.ord-tr { display:flex; justify-content:space-between; padding:.35rem 0; font-size:.88rem; color:var(--ink-2); }
.ord-tr b { color:var(--ink); }
.ord-tr.total { font-size:1.1rem; font-weight:800; color:var(--ink); padding-top:.75rem; margin-top:.5rem; border-top:1px solid var(--border); }
.ord-tr.exon b { color:#059669; }
.ord-customer { margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid var(--border); }
.ord-customer h3 { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-3); margin-bottom:.75rem; }
.ord-customer-row { display:flex; gap:.5rem; font-size:.88rem; padding:.22rem 0; }
.ord-customer-label { color:var(--ink-3); min-width:85px; flex-shrink:0; }
.ord-customer-val { color:var(--ink); font-weight:500; }
.ord-back { display:inline-flex; align-items:center; gap:.4rem; margin-top:1.25rem; font-size:.88rem; font-weight:600; color:var(--blue); cursor:pointer; background:0; border:0; }
.ord-back:hover { text-decoration:underline; }

/* ── Admin gate ──────────────────────────────────── */
.admin-gate { max-width:380px; margin:0 auto; text-align:center; }
.admin-gate h2 { margin-bottom:.5rem; }
.admin-gate p { color:var(--ink-2); font-size:.88rem; margin-bottom:1.25rem; }
.admin-gate .gate-form { display:flex; flex-direction:column; gap:.6rem; }
.admin-gate input {
  padding:.8rem 1.1rem; border:1.5px solid var(--border); border-radius:12px;
  font:inherit; font-size:.95rem; color:var(--ink); text-align:center;
  outline:none; transition:border-color .2s;
}
.admin-gate input:focus { border-color:var(--blue); }
.admin-gate input.err { border-color:#ef4444; animation:shake .4s; }
@keyframes shake { 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }
.admin-gate button.login-btn {
  padding:.85rem 1rem; border-radius:12px;
  background:var(--ink); color:var(--white);
  font:inherit; font-size:.95rem; font-weight:700;
  cursor:pointer; border:0; transition:background .2s;
}
.admin-gate button.login-btn:hover { background:var(--blue); }
.admin-gate button.login-btn:disabled { opacity:.55; cursor:not-allowed; }
.gate-error { margin-top:.75rem; color:#b91c1c; font-size:.82rem; }

/* ── Admin panel ──────────────────────────────────── */
.admin-panel { }
.admin-topbar {
  display:flex; align-items:center; justify-content:space-between;
  gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem;
}
.admin-topbar h2 { font-family:'Plus Jakarta Sans',sans-serif; font-size:1.35rem; font-weight:800; }
.admin-topbar-right { display:flex; align-items:center; gap:.65rem; }
.admin-stats { display:flex; gap:.5rem; flex-wrap:wrap; }
.admin-stat { padding:.32rem .7rem; border-radius:100px; font-size:.72rem; font-weight:700; background:var(--off-white); border:1px solid var(--border); color:var(--ink-2); }
.admin-stat b { color:var(--ink); }
.admin-logout { padding:.45rem .9rem; border-radius:100px; font:inherit; font-size:.78rem; font-weight:600; color:var(--ink-2); background:var(--off-white); border:1px solid var(--border); cursor:pointer; transition:background .2s, color .2s; }
.admin-logout:hover { background:#fef2f2; color:#b91c1c; border-color:#fecaca; }

.admin-filters { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:1.25rem; }
.af-btn { padding:.42rem .85rem; border-radius:100px; font-size:.78rem; font-weight:600; background:var(--off-white); border:1px solid var(--border); color:var(--ink-2); cursor:pointer; transition:background .2s, color .2s, border-color .2s; }
.af-btn:hover { color:var(--ink); border-color:var(--blue); }
.af-btn.active { background:var(--ink); color:var(--white); border-color:var(--ink); }

.admin-search {
  margin-bottom:1rem; position:relative;
}
.admin-search input {
  width:100%; padding:.65rem 1rem .65rem 2.4rem;
  border:1.5px solid var(--border); border-radius:12px;
  font:inherit; font-size:.88rem; color:var(--ink);
  background:var(--off-white); outline:none; transition:border-color .2s;
}
.admin-search input:focus { border-color:var(--blue); background:var(--white); }
.admin-search svg { position:absolute; left:.85rem; top:50%; transform:translateY(-50%); color:var(--ink-3); pointer-events:none; }

.admin-table { width:100%; border-collapse:separate; border-spacing:0; background:var(--white); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.admin-table th { font-family:'Space Grotesk',sans-serif; font-size:.66rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3); padding:.85rem 1rem; background:var(--off-white); border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; }
.admin-table td { padding:.7rem 1rem; font-size:.84rem; color:var(--ink); border-bottom:1px solid var(--border); vertical-align:middle; }
.admin-table tr:last-child td { border-bottom:0; }
.admin-table tr:hover td { background:rgba(20,71,255,.02); }
.admin-oid { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:.8rem; color:var(--blue); cursor:pointer; white-space:nowrap; }
.admin-oid:hover { text-decoration:underline; }
.admin-status-select { font:inherit; font-size:.78rem; font-weight:600; padding:.32rem .55rem; border-radius:8px; border:1.5px solid var(--border); background:var(--white); color:var(--ink); cursor:pointer; outline:none; transition:border-color .2s; }
.admin-status-select:focus { border-color:var(--blue); }
.admin-total { font-weight:700; white-space:nowrap; }
.admin-date { font-size:.75rem; color:var(--ink-3); white-space:nowrap; }
.admin-empty { text-align:center; padding:3rem 1rem; color:var(--ink-3); font-size:.92rem; }
.admin-footer { margin-top:1rem; display:flex; gap:.5rem; flex-wrap:wrap; }
.admin-footer button { padding:.5rem 1rem; border-radius:100px; font:inherit; font-size:.78rem; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--off-white); color:var(--ink); transition:background .2s; }
.admin-footer button:hover { background:var(--blue-tint); border-color:var(--blue); }

/* spinner */
.spin { display:flex; justify-content:center; padding:3rem; }
.spin::after { content:''; width:36px; height:36px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--blue); animation:sp .7s linear infinite; }
@keyframes sp { to { transform:rotate(360deg); } }

/* ── Feedback list ─────────────────────────────────── */
.fb-list { display:flex; flex-direction:column; gap:.6rem; }
.fb-card {
  background:var(--white); border:1px solid var(--border); border-radius:14px;
  padding:1rem 1.25rem; display:grid; grid-template-columns:1fr auto;
  gap:.5rem .75rem; align-items:start;
}
.fb-card-left { display:flex; flex-direction:column; gap:.35rem; }
.fb-stars { display:flex; align-items:center; gap:.25rem; }
.fb-stars svg { flex-shrink:0; }
.fb-ratings { display:flex; gap:1rem; flex-wrap:wrap; }
.fb-rating-label { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-3); margin-bottom:.2rem; }
.fb-comment { font-size:.88rem; color:var(--ink); line-height:1.55; margin-top:.15rem; }
.fb-comment:empty { display:none; }
.fb-meta { font-size:.72rem; color:var(--ink-3); text-align:right; line-height:1.6; }
.fb-recommend { display:inline-flex; align-items:center; gap:.3rem; padding:.22rem .55rem; border-radius:100px; font-size:.7rem; font-weight:700; }
.fb-recommend.yes { background:#ecfdf5; color:#065f46; border:1px solid rgba(5,150,105,.2); }
.fb-recommend.no  { background:#fef2f2; color:#991b1b; border:1px solid rgba(185,28,28,.2); }
.fb-empty { text-align:center; padding:3rem 1rem; color:var(--ink-3); font-size:.92rem; }

@media (max-width:768px) {
  .lookup-form { flex-direction:column; }
  .admin-table { display:block; overflow-x:auto; }
  .ord-result-head { flex-direction:column; align-items:flex-start; }
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/sb.js"></script>
<script src="assets/products.js"></script>
<script src="assets/products-static.js"></script>
<script src="assets/products-overrides.js"></script>
<script src="assets/cart.js"></script>
<script>
const ORDERS_KEY = 'platatech_orders_v1';
const WA         = '18494950959';
const app        = document.getElementById('app');

const STATUSES = [
  { id:'pendiente',  label:'Pendiente' },
  { id:'pagado',     label:'Pagado' },
  { id:'contactado', label:'Contactado' },
  { id:'encamino',   label:'En camino' },
  { id:'entregado',  label:'Entregado' },
  { id:'cancelado',  label:'Cancelado' }
];

let view        = 'lookup';
let adminFilter = 'todos';
let adminSearch = '';
let foundOrder  = null;

/* ── URL init ──────────────────────────────────────── */
const urlP = new URLSearchParams(location.search);
if (urlP.get('admin') === '1') view = 'admin-gate';

/* ── Helpers ───────────────────────────────────────── */
function fmtPrice(n) { return 'RD$' + Number(n || 0).toLocaleString('en-US'); }
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'})
       + ' ' + d.toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'});
}
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function sClass(s) { return 's-' + (s||'pendiente'); }
function sLabel(s) { return (STATUSES.find(x=>x.id===s)||STATUSES[0]).label; }

/* Map Supabase row (snake_case) → order object (camelCase) */
function rowToOrder(r) {
  if (!r) return null;
  return {
    id:               r.id,
    createdAt:        r.created_at,
    status:           r.status,
    paymentMethod:    r.payment_method,
    paypalOrderId:    r.paypal_order_id,
    paypalAmountUsd:  r.paypal_amount_usd,
    exchangeRate:     r.exchange_rate,
    codeliveryMode:   r.codelivery_mode,
    customer:         r.customer || {},
    items:            r.items || [],
    totals:           r.totals || {}
  };
}

/* ── Supabase queries ──────────────────────────────── */
async function sbLookup(id) {
  const { data, error } = await window.SB.from('orders').select('*').eq('id', id).maybeSingle();
  if (error) { console.error(error); return null; }
  return rowToOrder(data);
}

async function sbGetAll() {
  const { data, error } = await window.SB.from('orders').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return []; }
  return (data || []).map(rowToOrder);
}

async function sbUpdateStatus(id, status) {
  const { error } = await window.SB.from('orders').update({ status }).eq('id', id);
  if (error) console.error('update error:', error);
}

/* ── Check existing session on load ───────────────── */
(async function init() {
  const { data: { session } } = await window.SB.auth.getSession();
  if (session) { view = 'admin'; }
  const urlN = urlP.get('n');
  if (urlN && view !== 'admin') {
    app.innerHTML = '<div class="spin"></div>';
    foundOrder = await sbLookup(urlN.toUpperCase());
    view = foundOrder ? 'result' : 'lookup';
  }
  render();
})();

/* ── Render router ─────────────────────────────────── */
function render() {
  if (view === 'lookup')     renderLookup();
  else if (view === 'result')     renderResult();
  else if (view === 'admin-gate') renderAdminGate();
  else if (view === 'admin')      renderAdmin();
}

/* ── LOOKUP ────────────────────────────────────────── */
function renderLookup() {
  app.innerHTML = `
    <div class="lookup-box">
      <h2>Consulta tu orden</h2>
      <p>Ingresa tu numero de orden para ver el estado y los detalles de tu pedido.</p>
      <div class="lookup-form">
        <input type="text" id="lookupInput" placeholder="Ej: PT-260428-1234" autocomplete="off" spellcheck="false"/>
        <button type="button" id="lookupBtn">Buscar</button>
      </div>
      <div class="lookup-error" id="lookupErr">No encontramos una orden con ese numero.</div>
      <button class="admin-link" id="adminLink">Acceso administrador</button>
    </div>`;

  const input = document.getElementById('lookupInput');
  const btn   = document.getElementById('lookupBtn');
  const err   = document.getElementById('lookupErr');

  async function doLookup() {
    const q = input.value.trim().toUpperCase();
    if (!q) { input.focus(); return; }
    btn.disabled = true; btn.textContent = 'Buscando...';
    const order = await sbLookup(q);
    btn.disabled = false; btn.textContent = 'Buscar';
    if (order) {
      foundOrder = order;
      view = 'result';
      history.replaceState(null, '', '?n=' + encodeURIComponent(order.id));
      render();
    } else {
      err.classList.add('show');
      input.classList.add('err');
      input.focus();
    }
  }

  btn.addEventListener('click', doLookup);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });
  input.addEventListener('input', () => { err.classList.remove('show'); input.classList.remove('err'); });
  document.getElementById('adminLink').addEventListener('click', () => { view = 'admin-gate'; render(); });
  input.focus();
}

/* ── RESULT (cliente) ──────────────────────────────── */
function renderResult() {
  const o = foundOrder;
  if (!o) { view = 'lookup'; render(); return; }
  const isPaid = o.status === 'pagado';

  app.innerHTML = `
    <div class="ord-result">
      <div class="ord-result-head">
        <div>
          <div class="ord-result-id">${esc(o.id)}</div>
          <div class="ord-result-date">${fmtDate(o.createdAt)}</div>
        </div>
        <div class="ord-status-pill ${sClass(o.status)}">${esc(sLabel(o.status))}</div>
      </div>
      <div class="ord-result-body">
        <div>
          ${o.items.map(i => `
            <div class="ord-item">
              <div>
                <div class="ord-item-name">${esc(i.name)}</div>
                <div class="ord-item-meta">${esc(i.variant||'')}${i.qty>1?' &times; '+i.qty:''}</div>
              </div>
              <div class="ord-item-price">${fmtPrice(i.subtotal)}</div>
            </div>`).join('')}
        </div>
        <div class="ord-totals">
          <div class="ord-tr"><span>Subtotal</span><b>${fmtPrice(o.totals.subtotal)}</b></div>
          <div class="ord-tr${(o.totals.itbis===0||!o.totals.itbis)?' exon':''}">
            <span>ITBIS</span><b>${(!o.totals.itbis||o.totals.itbis===0)?'Exonerado':fmtPrice(o.totals.itbis)}</b>
          </div>
          <div class="ord-tr total"><span>Total</span><b>${fmtPrice(o.totals.total)}</b></div>
        </div>
        ${o.customer && o.customer.name ? `
        <div class="ord-customer">
          <h3>Entrega</h3>
          ${o.customer.name  ?`<div class="ord-customer-row"><span class="ord-customer-label">Nombre</span><span class="ord-customer-val">${esc(o.customer.name)}</span></div>`:''}
          ${o.customer.phone ?`<div class="ord-customer-row"><span class="ord-customer-label">Telefono</span><span class="ord-customer-val">${esc(o.customer.phone)}</span></div>`:''}
          ${o.customer.address?`<div class="ord-customer-row"><span class="ord-customer-label">Direccion</span><span class="ord-customer-val">${esc(o.customer.address)}</span></div>`:''}
          ${o.customer.sector ?`<div class="ord-customer-row"><span class="ord-customer-label">Sector</span><span class="ord-customer-val">${esc(o.customer.sector)}</span></div>`:''}
        </div>` : ''}
        ${isPaid && o.paypalOrderId ? `
        <div class="ord-customer" style="margin-top:.75rem;padding-top:.75rem;">
          <h3>Pago PayPal</h3>
          <div class="ord-customer-row"><span class="ord-customer-label">ID</span><span class="ord-customer-val" style="font-family:monospace;font-size:.8rem">${esc(o.paypalOrderId)}</span></div>
          <div class="ord-customer-row"><span class="ord-customer-label">Cobrado</span><span class="ord-customer-val">US$${o.paypalAmountUsd}</span></div>
        </div>` : ''}
        <button class="ord-back" id="backBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Buscar otra orden
        </button>
      </div>
    </div>`;

  document.getElementById('backBtn').addEventListener('click', () => {
    foundOrder = null; view = 'lookup';
    history.replaceState(null, '', 'ordenes.html');
    render();
  });
}

/* ── ADMIN GATE (login) ────────────────────────────── */
function renderAdminGate() {
  app.innerHTML = `
    <div class="admin-gate">
      <h2 class="h2">Acceso administrador</h2>
      <p>Ingresa con tu cuenta de administrador para gestionar todas las ordenes.</p>
      <div class="gate-form">
        <input type="email" id="adminEmail" placeholder="Email" autocomplete="email"/>
        <input type="password" id="adminPass" placeholder="Contraseña" autocomplete="current-password"/>
        <button type="button" class="login-btn" id="loginBtn">Entrar</button>
      </div>
      <div class="gate-error" id="gateErr"></div>
      <br/>
      <button class="ord-back" id="backToLookup">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Volver a consulta
      </button>
    </div>`;

  const emailEl = document.getElementById('adminEmail');
  const passEl  = document.getElementById('adminPass');
  const btn     = document.getElementById('loginBtn');
  const errEl   = document.getElementById('gateErr');

  async function doLogin() {
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    if (!email || !pass) return;
    btn.disabled = true; btn.textContent = 'Entrando...';
    const { error } = await window.SB.auth.signInWithPassword({ email, password: pass });
    if (error) {
      errEl.textContent = 'Email o contraseña incorrectos.';
      passEl.value = '';
      btn.disabled = false; btn.textContent = 'Entrar';
      passEl.classList.add('err');
      setTimeout(() => passEl.classList.remove('err'), 500);
    } else {
      view = 'admin';
      history.replaceState(null, '', '?admin=1');
      render();
    }
  }

  btn.addEventListener('click', doLogin);
  passEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') passEl.focus(); });
  document.getElementById('backToLookup').addEventListener('click', () => {
    view = 'lookup'; history.replaceState(null, '', 'ordenes.html'); render();
  });
  emailEl.focus();
}

/* ── Feedback helpers ──────────────────────────────── */
function renderStars(val, total = 5) {
  const filled = Math.max(0, Math.min(total, Math.round(val || 0)));
  let out = '';
  for (let i = 1; i <= total; i++) {
    if (i <= filled) {
      out += `<svg width="13" height="13" viewBox="0 0 24 24" fill="var(--blue)" stroke="var(--blue)" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    } else {
      out += `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    }
  }
  return out;
}

async function fetchFeedback() {
  const { data, error } = await window.SB.from('feedback').select('*').order('created_at', { ascending: false }).limit(50);
  if (error) { console.error('feedback error:', error); return []; }
  return data || [];
}

/* ── ADMIN PANEL ───────────────────────────────────── */
async function renderAdmin() {
  app.innerHTML = '<div class="spin"></div>';

  const [orders, feedbackRows] = await Promise.all([sbGetAll(), fetchFeedback()]);

  const filtered = orders.filter(o => {
    if (adminFilter === 'opiniones') return false; // feedback tab, skip order filter
    const matchStatus = adminFilter === 'todos' || o.status === adminFilter;
    const q = adminSearch.trim().toLowerCase();
    const matchSearch = !q
      || o.id.toLowerCase().includes(q)
      || (o.customer && o.customer.name && o.customer.name.toLowerCase().includes(q))
      || (o.customer && o.customer.phone && o.customer.phone.includes(q));
    return matchStatus && matchSearch;
  });

  const counts = {};
  orders.forEach(o => { counts[o.status] = (counts[o.status]||0)+1; });
  const active = orders.filter(o=>o.status==='pendiente'||o.status==='pagado'||o.status==='contactado'||o.status==='encamino').length;
  const totalRev = orders.filter(o=>o.status!=='cancelado').reduce((s,o)=>s+(o.totals.total||0),0);

  /* Feedback stats */
  const fbCount = feedbackRows.length;
  const fbAvgExp = fbCount ? (feedbackRows.reduce((s,r)=>s+(r.experience||0),0)/fbCount) : null;
  const fbAvgRep = fbCount ? (feedbackRows.reduce((s,r)=>s+(r.rep_rating||0),0)/fbCount) : null;
  const fbPctRec = fbCount ? Math.round(feedbackRows.filter(r=>r.recommend===true).length/fbCount*100) : null;

  const fbStatHtml = fbCount > 0
    ? `<div class="admin-stat">&#11088; <b>${fbAvgExp.toFixed(1)}</b> experiencia</div>
       <div class="admin-stat">&#11088; <b>${fbAvgRep.toFixed(1)}</b> asesor</div>
       <div class="admin-stat">&#128077; <b>${fbPctRec}%</b> recomiendan</div>
       <div class="admin-stat"><b>${fbCount}</b> opinion${fbCount===1?'':'es'}</div>`
    : `<div class="admin-stat" style="color:var(--ink-3)">Sin opiniones aun</div>`;

  /* Feedback content */
  let fbContentHtml = '';
  if (adminFilter === 'opiniones') {
    if (feedbackRows.length === 0) {
      fbContentHtml = '<div class="fb-empty">Todavia no hay opiniones registradas.</div>';
    } else {
      fbContentHtml = `<div class="fb-list">
        ${feedbackRows.map(r => {
          const recBadge = r.recommend === true
            ? `<span class="fb-recommend yes">&#128077; Si recomienda</span>`
            : r.recommend === false
              ? `<span class="fb-recommend no">&#128078; No recomienda</span>`
              : '';
          const d = r.created_at ? new Date(r.created_at) : null;
          const dateStr = d ? d.toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'}) : '—';
          return `<div class="fb-card">
            <div class="fb-card-left">
              <div class="fb-ratings">
                <div>
                  <div class="fb-rating-label">Experiencia</div>
                  <div class="fb-stars">${renderStars(r.experience)}<span style="font-size:.75rem;color:var(--ink-2);margin-left:.3rem">${r.experience||'—'}/5</span></div>
                </div>
                <div>
                  <div class="fb-rating-label">Asesor</div>
                  <div class="fb-stars">${renderStars(r.rep_rating)}<span style="font-size:.75rem;color:var(--ink-2);margin-left:.3rem">${r.rep_rating||'—'}/5</span></div>
                </div>
                <div style="display:flex;align-items:flex-end;padding-bottom:.05rem">${recBadge}</div>
              </div>
              ${r.comment ? `<div class="fb-comment">${esc(r.comment)}</div>` : ''}
            </div>
            <div class="fb-meta">
              ${r.order_id ? `<span style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--blue);font-size:.75rem">${esc(r.order_id)}</span><br/>` : ''}
              ${dateStr}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }
  }

  app.innerHTML = `
    <div class="admin-panel">
      <div class="admin-topbar">
        <h2>${orders.length} orden${orders.length===1?'':'es'}</h2>
        <div class="admin-topbar-right">
          <div class="admin-stats">
            <div class="admin-stat"><b>${active}</b> activas</div>
            <div class="admin-stat"><b>${orders.filter(o=>o.status==='entregado').length}</b> entregadas</div>
            <div class="admin-stat">Total <b>${fmtPrice(totalRev)}</b></div>
            ${fbStatHtml}
          </div>
          <button class="admin-logout" id="logoutBtn">Cerrar sesion</button>
        </div>
      </div>

      ${adminFilter !== 'opiniones' ? `
      <div class="admin-search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="search" id="adminSearchInput" placeholder="Buscar por numero, nombre o telefono..." value="${esc(adminSearch)}"/>
      </div>` : ''}

      <div class="admin-filters" id="adminFilters">
        <button class="af-btn ${adminFilter==='todos'?'active':''}" data-f="todos">Todas (${orders.length})</button>
        ${STATUSES.map(s => {
          const c = counts[s.id]||0;
          return `<button class="af-btn ${adminFilter===s.id?'active':''}" data-f="${s.id}">${s.label} (${c})</button>`;
        }).join('')}
        <button class="af-btn ${adminFilter==='opiniones'?'active':''}" data-f="opiniones">Opiniones (${fbCount})</button>
      </div>

      ${adminFilter === 'opiniones' ? fbContentHtml : (
        filtered.length === 0 ? '<div class="admin-empty">No hay ordenes con ese filtro.</div>' : `
      <table class="admin-table">
        <thead>
          <tr>
            <th>Orden</th>
            <th>Cliente</th>
            <th>Items</th>
            <th>Total</th>
            <th>Metodo</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(o => {
            const method = o.paymentMethod === 'online' ? 'PayPal' : (o.codeliveryMode === 'transferencia' ? 'Transfer.' : 'Efectivo');
            return `<tr>
              <td><span class="admin-oid" data-view="${esc(o.id)}">${esc(o.id)}</span></td>
              <td>
                ${esc(o.customer && o.customer.name ? o.customer.name : '—')}
                ${o.customer && o.customer.phone ? `<br/><span style="font-size:.72rem;color:var(--ink-3)">${esc(o.customer.phone)}</span>` : ''}
              </td>
              <td style="font-size:.78rem;color:var(--ink-2)">${o.items.length} art.</td>
              <td class="admin-total">${fmtPrice(o.totals.total)}</td>
              <td style="font-size:.78rem">${method}</td>
              <td>
                <select class="admin-status-select" data-oid="${esc(o.id)}">
                  ${STATUSES.map(s=>`<option value="${s.id}" ${o.status===s.id?'selected':''}>${s.label}</option>`).join('')}
                </select>
              </td>
              <td class="admin-date">${fmtDate(o.createdAt)}</td>
              <td>${o.lat && o.lng ? `<a href="https://www.google.com/maps/dir/?api=1&destination=${o.lat},${o.lng}" target="_blank" style="display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem;font-weight:700;color:var(--blue);text-decoration:none;padding:.3rem .6rem;border:1px solid rgba(20,71,255,.25);border-radius:7px;white-space:nowrap"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Navegar</a>` : ''}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`
      )}

      <div class="admin-footer">
        ${adminFilter !== 'opiniones' ? '<button id="exportCsv">Exportar CSV</button>' : ''}
        <button id="refreshBtn">Actualizar</button>
      </div>
    </div>`;

  /* Logout */
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await window.SB.auth.signOut();
    view = 'lookup'; history.replaceState(null, '', 'ordenes.html'); render();
  });

  /* Filters */
  document.getElementById('adminFilters').querySelectorAll('.af-btn').forEach(btn => {
    btn.addEventListener('click', () => { adminFilter = btn.dataset.f; renderAdmin(); });
  });

  /* Search (only shown outside opiniones tab) */
  const searchEl = document.getElementById('adminSearchInput');
  if (searchEl) {
    searchEl.addEventListener('input', e => {
      adminSearch = e.target.value; renderAdmin();
    });
  }

  /* Status change */
  document.querySelectorAll('.admin-status-select').forEach(sel => {
    sel.addEventListener('change', async () => {
      await sbUpdateStatus(sel.dataset.oid, sel.value);
      renderAdmin();
    });
  });

  /* View order detail */
  document.querySelectorAll('.admin-oid').forEach(el => {
    el.addEventListener('click', async () => {
      const o = orders.find(x => x.id === el.dataset.view);
      if (o) { foundOrder = o; view = 'result'; render(); }
    });
  });

  /* Refresh */
  document.getElementById('refreshBtn').addEventListener('click', () => renderAdmin());

  /* CSV export */
  const csvBtn = document.getElementById('exportCsv');
  if (csvBtn) {
    csvBtn.addEventListener('click', () => {
      const rows = [['Orden','Fecha','Cliente','Telefono','Direccion','Sector','Metodo','Estado','Items','Total RD$']];
      orders.forEach(o => {
        rows.push([
          o.id, o.createdAt,
          o.customer ? o.customer.name : '',
          o.customer ? o.customer.phone : '',
          o.customer ? o.customer.address : '',
          o.customer ? o.customer.sector : '',
          o.paymentMethod === 'online' ? 'PayPal' : o.codeliveryMode,
          o.status,
          o.items.map(i => i.qty + 'x ' + i.name).join(' | '),
          o.totals.total || 0
        ]);
      });
      const csv = rows.map(r => r.map(c => '"' + String(c||'').replace(/"/g,'""') + '"').join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type:'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ordenes-' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
    });
  }
}
</script>

</html>
