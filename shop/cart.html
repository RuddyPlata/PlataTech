<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/shop.css"/>
<style>
.cart-section { padding: 3rem 0 5rem; }
.cart-grid {
  display: grid; grid-template-columns: 1fr 380px;
  gap: 2rem; align-items: start;
}
.cart-items {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
}
.cart-item {
  display: grid; grid-template-columns: 110px 1fr auto;
  gap: 1.25rem; padding: 1.25rem;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.cart-item:last-child { border-bottom: none; }
.cart-item-img {
  width: 110px; height: 110px; border-radius: 12px;
  background: linear-gradient(135deg, var(--blue-tint), var(--off-white));
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
  overflow: hidden; padding: .5rem;
}
.cart-item-img svg { width: 90%; height: 90%; }
.cart-item-body { min-width: 0; }
.cart-item-brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: .65rem; font-weight: 600; letter-spacing: .16em;
  text-transform: uppercase; color: var(--blue);
  margin-bottom: .3rem;
}
.cart-item-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.02rem; font-weight: 700; color: var(--ink);
  margin-bottom: .2rem; line-height: 1.3;
}
.cart-item-variant {
  font-size: .82rem; color: var(--ink-3);
  margin-bottom: .7rem;
}
.cart-item-row {
  display: flex; align-items: center; gap: 1rem;
  flex-wrap: wrap;
}
.cart-item-price {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem; font-weight: 700; color: var(--ink);
}
.cart-item-qty {
  display: inline-flex; align-items: stretch;
  border: 1px solid var(--border-2); border-radius: 100px;
  overflow: hidden; background: var(--white);
}
.cart-item-qty button {
  padding: 0 .85rem; font-size: 1rem; color: var(--ink-2);
  transition: background .2s;
}
.cart-item-qty button:hover { background: var(--blue-tint); color: var(--ink); }
.cart-item-qty input {
  width: 2.5rem; text-align: center; border: none; outline: none;
  font: inherit; font-weight: 600; color: var(--ink); background: transparent;
  -moz-appearance: textfield;
}
.cart-item-qty input::-webkit-outer-spin-button,
.cart-item-qty input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.cart-item-remove {
  justify-self: start;
  font-size: .78rem; color: var(--red);
  padding: 0; background: none; border: none;
  text-decoration: underline; cursor: pointer;
  align-self: flex-start;
}
.cart-item-remove:hover { opacity: .7; }
.cart-item-sub {
  text-align: right;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.1rem; font-weight: 800; color: var(--ink);
  min-width: 100px;
}

/* Summary */
.cart-summary {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 1.75rem;
  position: sticky; top: 90px;
}
.cart-summary h3 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.15rem; font-weight: 800; color: var(--ink);
  margin-bottom: 1.25rem; letter-spacing: -0.01em;
}
.summary-row {
  display: flex; justify-content: space-between;
  padding: .55rem 0; font-size: .9rem; color: var(--ink-2);
}
.summary-row b { color: var(--ink); }
.summary-total {
  padding-top: 1rem; margin-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: 1.2rem; font-weight: 800; color: var(--ink);
}
.summary-total b {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.5rem; letter-spacing: -0.02em;
}
.summary-note {
  margin-top: 1rem; padding: .85rem 1rem; border-radius: 10px;
  background: var(--blue-tint); font-size: .78rem;
  color: var(--ink-2); line-height: 1.5;
}
#paypalButtonsCart {
  margin-top: 1.25rem; min-height: 50px;
}
.paypal-placeholder {
  padding: 1rem; border-radius: 12px;
  background: #fffbe6; border: 1px dashed #d4a24a;
  color: #7a5a10; font-size: .78rem; line-height: 1.5;
  margin-top: 1rem;
}
.summary-actions {
  display: flex; flex-direction: column; gap: .6rem;
  margin-top: 1.25rem;
}

/* Payment method picker */
.pay-section-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .78rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  color: var(--ink-3); margin: 1.5rem 0 .75rem;
}
.pay-methods {
  display: flex; flex-direction: column; gap: .55rem;
}
.pay-method {
  display: flex; align-items: center; gap: .85rem;
  padding: .85rem 1rem; border: 1.5px solid var(--border);
  border-radius: 12px; cursor: pointer;
  transition: border-color .2s, background .2s, transform .15s;
  background: var(--white);
}
.pay-method:hover { border-color: var(--blue); transform: translateY(-1px); }
.pay-method input { display: none; }
.pay-method.active {
  border-color: var(--blue);
  background: var(--blue-tint);
  box-shadow: 0 0 0 3px rgba(20,71,255,.1);
}
.pay-ico {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--off-white); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-2);
  flex-shrink: 0;
}
.pay-method.active .pay-ico {
  background: var(--white);
  border-color: var(--blue);
  color: var(--blue);
}
.pay-body { flex: 1; min-width: 0; }
.pay-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: .92rem; color: var(--ink);
  display: flex; align-items: center; gap: .5rem;
  flex-wrap: wrap;
}
.pay-discount {
  font-size: .65rem; font-weight: 800;
  padding: .15rem .5rem; border-radius: 100px;
  background: #059669; color: #fff; letter-spacing: .04em;
}
.pay-sub {
  font-size: .78rem; color: var(--ink-3);
  margin-top: .15rem;
}
.summary-row.discount b { color: #059669; }
.summary-row.discount {
  background: rgba(5,150,105,.08);
  margin: .15rem -.4rem; padding: .5rem .75rem;
  border-radius: 8px;
  font-weight: 600;
}
.pay-instructions {
  margin-top: 1rem; padding: .9rem 1rem; border-radius: 10px;
  background: var(--off-white); border: 1px solid var(--border);
  font-size: .8rem; color: var(--ink-2); line-height: 1.55;
}
.pay-instructions strong { color: var(--ink); }

.pay-submodes {
  display: grid; grid-template-columns: 1fr 1fr; gap: .55rem;
}
.pay-submode {
  padding: .75rem .85rem; border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  transition: border-color .2s, background .2s;
  background: var(--white);
}
.pay-submode:hover { border-color: var(--blue); }
.pay-submode input { display: none; }
.pay-submode.active {
  border-color: var(--blue);
  background: var(--blue-tint);
}
.pay-submode-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: .86rem; color: var(--ink);
}
.pay-submode-sub {
  font-size: .72rem; color: var(--ink-3);
  margin-top: .2rem; line-height: 1.35;
}
@media (max-width: 480px) {
  .pay-submodes { grid-template-columns: 1fr; }
}

/* Order form (contra entrega) */
.order-form { margin-top: 1rem; display: grid; gap: .65rem; }
.order-form .ff-row { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; }
.order-form label {
  display: block;
  font-size: .72rem; font-weight: 700;
  color: var(--ink-2); letter-spacing: .04em;
  margin-bottom: .3rem;
  text-transform: uppercase;
}
.order-form input,
.order-form textarea {
  width: 100%; padding: .75rem .9rem;
  border: 1.5px solid var(--border); border-radius: 10px;
  font: inherit; font-size: .88rem; color: var(--ink);
  background: var(--white);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.order-form input:focus,
.order-form textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(20,71,255,.1);
}
.order-form input.err,
.order-form textarea.err { border-color: var(--red); }
.order-form textarea { min-height: 70px; resize: vertical; }
.order-form .ff-error {
  color: var(--red); font-size: .72rem; margin-top: .25rem;
  display: none;
}
.order-form .ff-error.show { display: block; }
@media (max-width: 480px) {
  .order-form .ff-row { grid-template-columns: 1fr; }
}

/* Map picker */
.map-pick-btn {
  display: flex; align-items: center; gap: .55rem;
  padding: .7rem 1rem; border-radius: 10px;
  border: 1.5px dashed var(--border-2); background: var(--off-white);
  font: inherit; font-size: .86rem; font-weight: 600; color: var(--blue);
  cursor: pointer; transition: border-color .2s, background .2s;
  width: 100%;
}
.map-pick-btn:hover { border-color: var(--blue); background: var(--blue-tint); }
.map-pick-btn svg { flex-shrink: 0; }
.map-pin-label {
  font-size: .76rem; color: #059669; font-weight: 600;
  display: flex; align-items: center; gap: .35rem; margin-top: .3rem;
}
#mapPickerWrap {
  border-radius: 14px; overflow: hidden;
  border: 1.5px solid var(--border);
  margin-top: .5rem; display: none;
}
#mapPickerWrap.open { display: block; }
#mapDiv { width: 100%; height: 240px; }
.map-hint {
  padding: .5rem .85rem; background: var(--blue-tint);
  font-size: .75rem; color: var(--ink-2); text-align: center;
}

/* Empty */
.cart-empty {
  padding: 5rem 2rem; text-align: center;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px;
}
.cart-empty svg {
  color: var(--ink-3); margin-bottom: 1.25rem;
}
.cart-empty h2 { margin-bottom: .75rem; }
.cart-empty p {
  color: var(--ink-2); margin-bottom: 1.75rem;
}

@media (max-width: 900px) {
  .cart-grid { grid-template-columns: 1fr; }
  .cart-summary { position: static; }
  .cart-item { grid-template-columns: 80px 1fr; }
  .cart-item-img { width: 80px; height: 80px; }
  .cart-item-sub { grid-column: 1 / -1; text-align: right; }
}

/* Checkout auth step */
.checkout-auth { margin-top: 1rem; padding: 1.25rem; background: var(--blue-tint); border: 1.5px solid rgba(30,80,212,.18); border-radius: 14px; }
.checkout-auth-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: .95rem; font-weight: 800; color: var(--ink); margin-bottom: .3rem; }
.checkout-auth-sub { font-size: .8rem; color: var(--ink-2); line-height: 1.5; margin-bottom: 1rem; }
.checkout-auth-error { background: rgba(231,76,60,.07); border: 1px solid rgba(231,76,60,.25); border-radius: 8px; padding: .55rem .8rem; font-size: .8rem; color: #c0392b; margin-bottom: .75rem; display: none; }
.checkout-auth-error.show { display: block; }
.btn-google { display: flex; align-items: center; justify-content: center; gap: .6rem; width: 100%; padding: .75rem 1rem; border-radius: 100px; background: var(--white); border: 1.5px solid var(--border-2); font-family: 'Plus Jakarta Sans', sans-serif; font-size: .88rem; font-weight: 600; color: var(--ink); cursor: pointer; transition: border-color .2s, background .2s; margin-bottom: .85rem; }
.btn-google:hover { border-color: var(--blue); background: var(--blue-tint); }
.auth-sep { display: flex; align-items: center; gap: .75rem; margin: .75rem 0; color: var(--ink-3); font-size: .78rem; }
.auth-sep::before, .auth-sep::after { content: ''; flex: 1; height: 1px; background: var(--border-2); }
.ca-switch { text-align: center; margin-top: .6rem; font-size: .8rem; color: var(--ink-3); }
.ca-switch button { background: none; border: none; color: var(--blue); cursor: pointer; font: inherit; font-size: .8rem; text-decoration: underline; }

</style>
</head>

<script>
const root = document.getElementById('cartRoot');
/* Contra-entrega: sin ITBIS en UI. Online: 18% ITBIS incluido. */
const RATE_FALLBACK = 60;       // Tasa fallback RD$/USD

/* ── Tasa de cambio dinámica USD→DOP ───────────────── */
let usdToDop = RATE_FALLBACK;
let rateSource = 'fallback';

(async function fetchRate() {
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (data.result === 'success' && data.rates && data.rates.DOP) {
      usdToDop = data.rates.DOP;
      rateSource = 'open.er-api';
      render(); // re-render con tasa actualizada
    }
  } catch (e) {
    console.warn('No se pudo obtener tasa USD/DOP, usando fallback', RATE_FALLBACK, e);
  }
})();

function rdToUsd(rdp) { return +(rdp / usdToDop).toFixed(2); }
function fmtUsd(n) { return 'US$' + n.toFixed(2); }

/* Métodos de pago principales */
const PAYMENT_METHODS = [
  {
    id: 'online',
    name: 'Pago en línea',
    sub: 'PayPal o tarjeta en USD · Entrega 1 a 3 días',
    badge: null,
    icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>'
  },
  {
    id: 'contra-entrega',
    name: 'Pago contra entrega',
    sub: 'Efectivo o transferencia · Entrega el mismo día',
    badge: 'MISMO DÍA',
    icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M8 21H3v-5M21 3l-7 7M3 21l7-7"/></svg>'
  }
];

/* Sub-opción para contra entrega */
const CODELIVERY_MODES = [
  { id: 'efectivo',      name: 'Efectivo',      sub: 'Pago en RD$ al recibir · Entrega el mismo día (máx 24h)' },
  { id: 'transferencia', name: 'Transferencia', sub: 'Popular · BHD · Banreservas · Entrega el mismo día (máx 24h)' }
];

/* SLA de entrega segun forma de pago */
function deliverySLA() {
  if (paymentMethod === 'contra-entrega') {
    return { text: 'El mismo día · máx 24h', fast: true };
  }
  return { text: '1 a 3 días laborables', fast: false };
}

let paymentMethod  = 'online';       // 'online' | 'contra-entrega'
let codeliveryMode = 'efectivo';     // 'efectivo' | 'transferencia' (solo aplica si contra-entrega)

/* Estado del formulario (persistido entre re-renders) */
let formState = { name: '', email: '', phone: '', address: '', sector: '', notes: '' };
let pinLocation = null; // { lat, lng } set by map picker
let currentUser = null; // set by initAuth()
function captureFormState() {
  const form = document.getElementById('orderForm');
  if (!form) return;
  Object.keys(formState).forEach(f => {
    const el = form.querySelector(`[name="${f}"]`);
    if (el) formState[f] = el.value;
  });
}
function restoreFormState() {
  const form = document.getElementById('orderForm');
  if (!form) return;
  Object.keys(formState).forEach(f => {
    const el = form.querySelector(`[name="${f}"]`);
    if (el) el.value = formState[f] || '';
  });
}

/* Calcular totales — contra-entrega exonerado de ITBIS, online incluye 18% ITBIS */
function computeTotals() {
  const items = window.Cart.get();
  let subtotal = 0;
  items.forEach(i => {
    const p = window.getProductBySlug(i.slug);
    if (p) subtotal += p.price * i.qty;
  });
  const noItbis = (paymentMethod === 'contra-entrega');
  const itbis   = noItbis ? 0 : Math.round(subtotal * 0.18);
  const total   = subtotal + itbis;
  const itemCount = items.reduce((s, i) => s + i.qty, 0);
  return { subtotal, itbis, total, itemCount, noItbis };
}

function render() {
  captureFormState();
  const items = window.Cart.get();

  if (items.length === 0) {
    root.innerHTML = `
      <div class="cart-empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <h2 class="h2">Tu carrito está vacío</h2>
        <p>Explora la tienda y agrega los productos que te interesan.</p>
        <a href="index.html" class="btn btn-primary btn-lg">Ir a la tienda</a>
      </div>`;
    return;
  }

  const totals = computeTotals();

  root.innerHTML = `
    <div class="cart-grid">
      <div class="cart-items" id="cartItems">
        ${items.map(it => {
          const p = window.getProductBySlug(it.slug);
          if (!p) return '';
          return `
            <div class="cart-item" data-slug="${p.slug}">
              <div class="cart-item-img">${window.renderProductMock(p, 90)}</div>
              <div class="cart-item-body">
                <div class="cart-item-brand">${p.brand}</div>
                <div class="cart-item-name">${p.name}</div>
                <div class="cart-item-variant">${p.variant || ''}</div>
                <div class="cart-item-row">
                  <div class="cart-item-price">${window.formatPrice(p.price)}</div>
                  <div class="cart-item-qty">
                    <button data-qty="-" aria-label="Reducir" ${it.qty <= 1 ? 'disabled style="opacity:.35"' : ''}>−</button>
                    <input type="number" value="${it.qty}" min="1" max="${p.stock}" data-qty-input/>

function wireItemControls() {
  document.querySelectorAll('.cart-item').forEach(row => {
    const slug = row.dataset.slug;
    const input = row.querySelector('[data-qty-input]');
    const btnMinus = row.querySelector('[data-qty="-"]');
    const btnPlus  = row.querySelector('[data-qty="+"]');
    function syncBtns() {
      const p = window.getProductBySlug(slug);
      const v = +input.value;
      btnMinus.disabled = v <= 1; btnMinus.style.opacity = v <= 1 ? '.35' : '';
      btnPlus.disabled  = v >= p.stock; btnPlus.style.opacity  = v >= p.stock ? '.35' : '';
    }
    btnMinus.addEventListener('click', () => {
      window.Cart.setQty(slug, Math.max(1, +input.value - 1));
      render();
    });
    btnPlus.addEventListener('click', () => {
      const p = window.getProductBySlug(slug);
      window.Cart.setQty(slug, Math.min(p.stock, +input.value + 1));
      render();
    });
    input.addEventListener('change', () => {
      const p = window.getProductBySlug(slug);
      const v = Math.max(1, Math.min(p.stock, +input.value || 1));
      window.Cart.setQty(slug, v);
      render();
    });
    row.querySelector('[data-remove]').addEventListener('click', () => {
      window.Cart.remove(slug);
      render();
    });
  });

  const clearBtn = document.getElementById('clearCart');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    if (confirm('¿Vaciar el carrito?')) { window.Cart.clear(); render(); }
  });
}

function wirePaymentMethods() {
  document.querySelectorAll('.pay-method').forEach(el => {
    el.addEventListener('click', () => {
      paymentMethod = el.dataset.pay;
      render();
    });
  });
  document.querySelectorAll('.pay-submode').forEach(el => {
    el.addEventListener('click', () => {
      codeliveryMode = el.dataset.submode;
      render();
    });
  });
}

function wireAuthStep() {
  const errEl = () => document.getElementById('caError');
  function showErr(msg) { const e = errEl(); if(e){e.textContent=msg;e.classList.toggle('show',!!msg);} }

  const googleBtn = document.getElementById('caGoogleBtn');
  if (googleBtn) googleBtn.addEventListener('click', async () => {
    googleBtn.disabled = true; googleBtn.textContent = 'Redirigiendo…';
    await window.SB.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
  });

  document.getElementById('caShowLogin')?.addEventListener('click', () => {
    document.getElementById('caRegisterPanel').style.display = 'none';
    document.getElementById('caLoginPanel').style.display = '';
    showErr('');
  });
  document.getElementById('caShowRegister')?.addEventListener('click', () => {
    document.getElementById('caRegisterPanel').style.display = '';
    document.getElementById('caLoginPanel').style.display = 'none';
    showErr('');
  });

  const regBtn = document.getElementById('caRegisterBtn');
  if (regBtn) regBtn.addEventListener('click', async () => {
    const email = (document.getElementById('caEmail').value || '').trim();
    const pw = document.getElementById('caPassword').value || '';
    showErr('');
    if (!email || !pw) { showErr('Por favor ingresa tu correo y contraseña.'); return; }
    if (pw.length < 6) { showErr('La contraseña debe tener al menos 6 caracteres.'); return; }
    regBtn.disabled = true; regBtn.textContent = 'Creando cuenta…';
    const { error } = await window.SB.auth.signUp({ email, password: pw });
    if (error) {
      if (error.message.toLowerCase().includes('already')) {
        showErr('Ya existe una cuenta con ese correo. Usa "Iniciar sesión".');
      } else { showErr(error.message); }
      regBtn.disabled = false; regBtn.textContent = 'Crear cuenta y continuar';
    }
    // onAuthStateChange handles re-render on success
  });

  const loginBtn = document.getElementById('caLoginBtn');
  if (loginBtn) loginBtn.addEventListener('click', async () => {
    const email = (document.getElementById('caLoginEmail').value || '').trim();
    const pw = document.getElementById('caLoginPassword').value || '';
    showErr('');
    if (!email || !pw) { showErr('Por favor ingresa tu correo y contraseña.'); return; }
    loginBtn.disabled = true; loginBtn.textContent = 'Entrando…';
    const { error } = await window.SB.auth.signInWithPassword({ email, password: pw });
    if (error) {
      showErr('Correo o contraseña incorrectos.');
      loginBtn.disabled = false; loginBtn.textContent = 'Iniciar sesión';
    }
  });
}

/* ── Place order (contra entrega) ─────────────────────── */
const ORDERS_KEY = 'platatech_orders_v1';

function generateOrderNumber() {
  const d = new Date();
  const yy = String(d.getFullYear()).slice(-2);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  const hex = (arr[0] & 0xFFFFFF).toString(16).toUpperCase().padStart(6, '0');
  return `PT-${yy}${mm}${dd}-${hex}`;
}

async function saveOrder(order) {
  /* localStorage (fallback/cache local) */
  try {
    const all = JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]');
    all.unshift(order);
    localStorage.setItem(ORDERS_KEY, JSON.stringify(all.slice(0, 50)));
  } catch (e) {}

  /* Supabase (fuente de verdad central) */
  if (window.SB) {
    const { error } = await window.SB.from('orders').insert({
      id:                 order.id,
      status:             order.status || 'pendiente',
      payment_method:     order.paymentMethod || null,
      paypal_order_id:    order.paypalOrderId || null,
      paypal_payer:       order.paypalPayer || null,
      paypal_amount_usd:  order.paypalAmountUsd ? parseFloat(order.paypalAmountUsd) : null,
      exchange_rate:      order.exchangeRate ? parseFloat(order.exchangeRate) : null,
      codelivery_mode:    order.codeliveryMode || null,
      customer:           order.customer,
      items:              order.items,
      totals:             order.totals,
      lat:                order.lat || null,
      lng:                order.lng || null
    });
    if (error) console.error('Supabase saveOrder error:', error);
  }
}

function validateOrderForm() {
  const form = document.getElementById('orderForm');
  if (!form) return null;
  const fields = ['name','email','phone','address','sector'];
  let ok = true;
  const data = {};
  fields.forEach(f => {
    const el = form.querySelector(`[name="${f}"]`);
    const errEl = form.querySelector(`[data-err="${f}"]`);
    const v = (el.value || '').trim();
    data[f] = v;
    let valid = v.length >= 2;
    if (f === 'email') valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    if (f === 'phone') valid = /[0-9]{7,}/.test(v.replace(/\D/g,''));
    if (!valid) { el.classList.add('err'); errEl.classList.add('show'); ok = false; }
    else       { el.classList.remove('err'); errEl.classList.remove('show'); }
  });
  data.notes = (form.querySelector('[name="notes"]').value || '').trim();
  return ok ? data : null;
}

async function placeOrder(totals) {
  const customer = validateOrderForm();
  if (!customer) {
    document.getElementById('orderForm').scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const btn = document.getElementById('placeOrderBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando orden...'; }

  const items = window.Cart.get().map(i => {
    const p = window.getProductBySlug(i.slug);
    return p ? {
      slug: p.slug, name: p.name, variant: p.variant || '',
      qty: i.qty, price: p.price, subtotal: p.price * i.qty
    } : null;
  }).filter(Boolean);

  const order = {
    id: generateOrderNumber(),
    createdAt: new Date().toISOString(),
    status: 'pendiente',
    paymentMethod: 'contra-entrega',
    codeliveryMode: codeliveryMode,
    customer: customer,
    items: items,
    totals: {
      subtotal: totals.subtotal,
      discount: totals.discount,
      subtotalNet: totals.subtotalNet,
      itbis: totals.itbis,
      total: totals.total,
      itemCount: totals.itemCount
    },
    lat: pinLocation ? pinLocation.lat : null,
    lng: pinLocation ? pinLocation.lng : null
  };

  await saveOrder(order);
  window.Cart.clear();
  location.href = `orden.html?n=${encodeURIComponent(order.id)}`;
}

let ppIsBlocked = false; // always re-verified server-side on each load

function ppBlockedHtml() {
  return `<div style="background:#fef2f2;border:1.5px solid #fecaca;border-radius:12px;padding:1.25rem;text-align:center;font-size:.88rem;color:#991b1b;line-height:1.6">

    <b>Pagos bloqueados desde este dispositivo.</b><br/>
    Se detectaron múltiples intentos fallidos.<br/>
    Coordina tu pedido por <a href="https://wa.me/18494950959" target="_blank" style="color:#991b1b;font-weight:700">WhatsApp</a> o usa contra-entrega.
  </div>`;
}

// Check block status — always asks server (real IP); fail CLOSED on network error
async function ppCheckBlock() {
  if (ppIsBlocked) return true;
  try {
    const { data } = await window.SB.functions.invoke('payment-guard', {
      body: { action: 'check' }
    });
    if (data?.blocked) ppIsBlocked = true;
    return !!data?.blocked;
  } catch (e) {
    ppIsBlocked = true; // fail closed — if guard unreachable, block PayPal
    return true;
  }
}

// Record a PayPal failure server-side (by real IP)
async function ppRecordFail() {
  try {
    const { data } = await window.SB.functions.invoke('payment-guard', {
      body: { action: 'fail', ua: navigator.userAgent.substring(0, 250) }
    });
    if (data?.blocked) ppIsBlocked = true;
    return data || { fails: 1, blocked: false };
  } catch (e) {
    ppIsBlocked = true; // fail closed on network error
    return { fails: 1, blocked: true };
  }
}

let ppRendering = false;
async function renderPayPal(totals) {
  const container = document.getElementById('paypalButtonsCart');
  if (!container || ppRendering) return;
  ppRendering = true;

  const blocked = await ppCheckBlock();
  if (blocked) {
    container.innerHTML = ppBlockedHtml();
    ppRendering = false;
    return;
  }

  container.innerHTML = '';

  if (typeof paypal === 'undefined' || !window.paypal || !window.paypal.Buttons) {
    // SDK still loading — retry up to 5 times every 800ms
    let tries = 0;
    const wait = setInterval(() => {
      tries++;
      if (window.paypal && window.paypal.Buttons) {
        clearInterval(wait);
        ppRendering = false;
        renderPayPal(totals);
      } else if (tries >= 5) {
        clearInterval(wait);
        ppRendering = false;
        container.innerHTML = `<div class="paypal-placeholder">
          <b>No se pudo cargar PayPal.</b> Verifica tu conexión o <a href="https://wa.me/18494950959" target="_blank">coordina por WhatsApp</a>.
        </div>`;
      }
    }, 800);
    return;
  }

  try {
    paypal.Buttons({
      style: { layout: 'vertical', color: 'gold', shape: 'pill', label: 'checkout', height: 48 },

      createOrder: function(data, actions) {
        const cartItems = window.Cart.get();
        const items = cartItems.map(function(it) {
          const p = window.getProductBySlug(it.slug);
          if (!p) return null;
          return {
            name: (p.name + ' ' + (p.variant || '')).substring(0, 127),
            quantity: String(it.qty),
            unit_amount: { value: rdToUsd(p.price).toFixed(2), currency_code: 'USD' },
            sku: p.slug
          };
        }).filter(Boolean);

        // Apply silent 6% margin buffer on USD amount to cover PayPal fees + min margin
        const subTotUsd = +(items.reduce(function(s, i) { return s + (+i.unit_amount.value * +i.quantity); }, 0) * 1.06).toFixed(2);
        const taxUsd    = +(subTotUsd * 0.18).toFixed(2);

        return actions.order.create({
          purchase_units: [{
            description: 'Pedido Plata Tech Store',
            soft_descriptor: 'PlataTech',
            items: items,
            amount: {
              value: (subTotUsd + taxUsd).toFixed(2),
              currency_code: 'USD',
              breakdown: {
                item_total: { value: subTotUsd.toFixed(2), currency_code: 'USD' },

function fillFormFromUser(user) {
  const meta = user.user_metadata || {};
  if (!formState.name && meta.name)       formState.name    = meta.name;
  if (!formState.email)                   formState.email   = user.email || '';
  if (!formState.phone && meta.phone)     formState.phone   = meta.phone;
  if (!formState.address && meta.address) formState.address = meta.address;
  if (!formState.sector && meta.sector)   formState.sector  = meta.sector;
  restoreFormState();
}

(async function initAuth() {
  if (!window.SB) return;
  const { data: { session } } = await window.SB.auth.getSession();
  if (session) {
    currentUser = session.user;
    fillFormFromUser(session.user);
    const firstName = ((session.user.user_metadata || {}).name || '').split(' ')[0];
    const navLabel = document.getElementById('navAccountLabel');
    if (navLabel && firstName) navLabel.textContent = firstName;
    render();
  }
  window.SB.auth.onAuthStateChange((event, session) => {
    currentUser = session ? session.user : null;
    if (session) {
      fillFormFromUser(session.user);
      const firstName = ((session.user.user_metadata || {}).name || '').split(' ')[0];
      const navLabel = document.getElementById('navAccountLabel');
      if (navLabel && firstName) navLabel.textContent = firstName;
    }
    render();
  });
})();

<script>

function loadMapsScript() {
  return new Promise(resolve => {
    if (window.google && window.google.maps) { resolve(); return; }
    window._mapsReady = resolve;
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${window.GMAPS_KEY}&callback=_mapsReady&loading=async`;
    s.async = true; s.defer = true;
    document.head.appendChild(s);
  });
}

document.addEventListener('click', async e => {
  const btn = e.target.closest('#mapPickBtn');
  if (!btn) return;

  const wrap = document.getElementById('mapPickerWrap');
  if (wrap.classList.contains('open')) { wrap.classList.remove('open'); return; }

  btn.textContent = 'Cargando mapa…';
  btn.disabled = true;

  await loadMapsScript();

  wrap.classList.add('open');

  if (mapInstance) return; // already initialized

  const defaultPos = pinLocation || { lat: 18.4861, lng: -69.9312 };

  mapInstance = new google.maps.Map(document.getElementById('mapDiv'), {

  });

  mapInstance.addListener('click', e => {
    markerInstance.setPosition(e.latLng);
    pinLocation = { lat: e.latLng.lat(), lng: e.latLng.lng() };
    updatePinLabel(pinLocation, null);
  });

  startGeoCapture();

  // Wire recapture button
  const recaptureBtn = document.getElementById('recaptureBtn');
  if (recaptureBtn) recaptureBtn.addEventListener('click', startGeoCapture);
});

// High-accuracy geolocation — callable anytime (recapture button or first open)
function startGeoCapture() {
  if (!navigator.geolocation || !mapInstance) return;
  const TARGET_M = 15, MAX_TRIES = 3, INTERVAL_MS = 5000;
  let attempt = 0, goodReadings = [], bestReading = null;

  function setMapPin(loc) {
    mapInstance.setCenter(loc);
    markerInstance.setPosition(loc);
    pinLocation = loc;
  }

  // Disable recapture button while running
  const recBtn = document.getElementById('recaptureBtn');
  if (recBtn) { recBtn.disabled = true; recBtn.textContent = 'Capturando…'; }

  function tryGeo() {
    attempt++;
    updatePinLabel(null, `Intento ${attempt}/${MAX_TRIES}…`);
    navigator.geolocation.getCurrentPosition(pos => {
      const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const acc = pos.coords.accuracy;

      if (!bestReading || acc < bestReading.acc) bestReading = { loc, acc };

      if (acc <= TARGET_M) {
        goodReadings.push(loc);
        if (goodReadings.length >= 2) {
          const finalLoc = {
            lat: goodReadings.reduce((s, r) => s + r.lat, 0) / goodReadings.length,
            lng: goodReadings.reduce((s, r) => s + r.lng, 0) / goodReadings.length
          };
          setMapPin(finalLoc);
          updatePinLabel(finalLoc, null, acc);
          if (recBtn) { recBtn.disabled = false; recBtn.textContent = 'Recapturar ubicación'; }
          return;
        }
      }

      if (attempt < MAX_TRIES) {
        setMapPin(loc);
        updatePinLabel(loc, null, acc);
        setTimeout(tryGeo, INTERVAL_MS);
      } else {
        setMapPin(bestReading.loc);
        updatePinLabel(bestReading.loc, null, bestReading.acc);
        if (recBtn) { recBtn.disabled = false; recBtn.textContent = 'Recapturar ubicación'; }
      }
    }, () => {
      if (attempt < MAX_TRIES) {
        setTimeout(tryGeo, INTERVAL_MS);
      } else {
        if (recBtn) { recBtn.disabled = false; recBtn.textContent = 'Recapturar ubicación'; }
        updatePinLabel(null, null, null);
      }
    }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
  }

  tryGeo();
}

function updatePinLabel(loc, status, accuracy) {
  const el = document.getElementById('mapPinLabel');
  if (!el) return;
  if (status) {
    el.innerHTML = `<span class="map-pin-label" style="color:var(--ink-3)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg> ${status}</span>`;
    return;
  }
  const accText = accuracy != null ? ` · precisión ~${Math.round(accuracy)}m` : '';
  const isGood  = accuracy != null && accuracy <= 15;
  el.innerHTML = `<span class="map-pin-label" style="${isGood ? '' : 'color:#d97706'}">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
    Ubicación marcada${accText}${isGood ? ' ✓' : ' — ajusta el pin si es necesario'}
  </span>`;
}
